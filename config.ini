# tmrc configuration
# See README.md and specs/spec.md for context.

[capture]
# Sample rate for parsing events (capture/processing interval).
# Default 100 ms = 10 FPS.
sample_rate_ms = 100

# Maximum segment duration in milliseconds. Recorder force-flushes at this interval
# so segments keep progressing even when screen-diff events are sparse.
segment_max_duration_ms = 1000

# Screen-diff threshold for triggering an event from two consecutive frames.
# Lower values are more sensitive; set 0 to treat any pixel change as an event.
capture_diff_threshold = 100000

# Which display(s) to capture. Options: main (default), or combined / display index (TBD).
display = main

# Capture mode: full_screen (default), window, or app.
capture_mode = full_screen

# Audio recording. Default: off.
audio_enabled = false

# Record while display is locked or machine is sleeping. Default: off.
record_when_locked_or_sleeping = false

[session]
# Session name. Multiple sessions supported; default session name.
session = default

[storage]
# Storage root for recordings and index. Default: ~/.tmrc/
storage_root = ~/.tmrc/

# Retention: per-session ring-buffer.
# Set 0 to disable the respective limit.
retention_max_age_days = 30
retention_max_disk_bytes = 53687091200

[indexing]
# Indexing/recall mode: normal or advanced.
index_mode = normal

# OCR languages: comma-separated BCP 47 locale strings.
ocr_recognition_languages = en-US,zh-Hant,zh-Hans

# OCR granularity. Default: per_segment_summary.
ocr_granularity = per_segment_summary

# Default time range for "search". Default: 24h.
search_default_range = 24h

[export]
# Export quality (MP4/GIF). Options: low, medium, high.
export_quality = high
