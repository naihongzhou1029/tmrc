# tmrc configuration
# See README.md and specs/spec.md for context.

# Sample rate for parsing events (capture/processing interval).
# Default 100 ms = 10 FPS. Time is used as the sample rate for event-based recording.
sample_rate_ms: 100

# Which display(s) to capture. Options: main (default), or combined / display index (TBD).
# Default: main display only.
display: main

# Capture mode: full_screen (default), window, or app.
# When window/app: filtering rules (which window or app) TBD in implementation.
capture_mode: full_screen

# Audio recording. No segmentation; when enabled, records continuously.
# Default: off. When enabled, time-based segments (3 h) are used for export (MP3, timestamp as base name).
audio_enabled: false

# Record while display is locked or machine is sleeping. Default: off (pause/stop in those states).
# Enable only if needed; small use case.
record_when_locked_or_sleeping: false

# Session name. Multiple sessions supported (e.g. override via CLI); default session name.
session: default

# Storage root for recordings and index. Default: ~/.tmrc/
# Overridable via config or env (TBD).
storage_root: ~/.tmrc/

# Indexing/recall mode: normal (lighter, no sub-options) or advanced (best UX, sub-options configurable).
# Advanced = real-time indexing, full OCR, semantic, LLM, multi-match, re-indexing. Normal = lighter defaults throughout.
index_mode: normal

# OCR: backend is Vision VNRecognizeTextRequest only. Languages passed to recognitionLanguages (no auto-detect).
# List of locale strings (BCP 47 / Apple locale IDs). Add more entries to support other languages, e.g. "ja-JP", "ko-KR", "fr-FR".
# See Apple Vision docs for supported recognition languages. Order can affect which language is preferred when multiple match.
ocr_recognition_languages:
  - en-US
  - zh-Hant
  - zh-Hans

# OCR granularity. Default: per_segment_summary (one OCR result per segment; balanced).
# Advanced mode only: can set to per_frame, keyframes, etc. Normal mode ignores this and always uses per_segment_summary.
ocr_granularity: per_segment_summary

# Default time range for "ask" (how far back to search). Default: 24h. Overridable via CLI --since / --until.
ask_default_range: 24h

# Export quality (MP4/GIF). Default: high. Advanced users: three levels — low, medium, high.
# low: 720p, ~2 Mbps; medium: 1080p, ~5 Mbps; high: source resolution (or 1080p+), ~8 Mbps. GIF uses same level for resolution/frame rate.
export_quality: high

# Clear tmrc.log when starting recording from CLI (each daemon start). Does not clear on in-process restarts (e.g. stream error recovery). Default: true.
clear_log_on_start: true
